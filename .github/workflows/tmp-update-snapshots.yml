name: Temp Update Explorer Snapshots

on:
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Chromium
        run: pnpm --filter @act/explorer exec playwright install --with-deps chromium

      - name: Update visual snapshots
        run: pnpm --filter @act/explorer run test:e2e:update

      - name: Upload updated snapshots
        uses: actions/upload-artifact@v4
        with:
          name: explorer-snapshots
          path: apps/explorer/e2e/explorer.spec.ts-snapshots/
