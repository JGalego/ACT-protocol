apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "act.fullname" . }}-api-config
  labels:
    {{- include "act.labels" . | nindent 4 }}
data:
  NODE_ENV: production
  ACT_STORAGE: postgres
  ACT_OIDC_ISSUER: {{ required "api.oidc.issuer is required in production" .Values.api.oidc.issuer | quote }}
  ACT_OIDC_AUDIENCE: {{ required "api.oidc.audience is required in production" .Values.api.oidc.audience | quote }}
