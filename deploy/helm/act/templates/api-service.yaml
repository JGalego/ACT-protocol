apiVersion: v1
kind: Service
metadata:
  name: {{ include "act.fullname" . }}-api
  labels:
    {{- include "act.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.api.port }}
      targetPort: http
  selector:
    {{- include "act.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api
